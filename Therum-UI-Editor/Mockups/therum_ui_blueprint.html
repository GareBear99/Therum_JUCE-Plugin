<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>THERUM UI Blueprint</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#050816;color:#eef4ff}
.shell{max-width:1450px;margin:24px auto;padding:24px;border:1px solid rgba(0,246,255,.25);border-radius:28px;background:linear-gradient(180deg,#0b1124,#060915)}
.row{display:grid;grid-template-columns:1.35fr .85fr 1fr;gap:18px;margin-top:18px}
.card{background:#13192c;border:1px solid rgba(255,255,255,.08);border-radius:22px;min-height:180px;padding:18px;box-shadow:0 0 30px rgba(0,246,255,.05)}
h1{margin:0;color:#00f6ff;letter-spacing:.2em}
.tag{display:inline-block;margin-right:8px;padding:6px 10px;border-radius:20px;border:1px solid rgba(255,79,216,.22);color:#ff4fd8}
.small{font-size:12px;color:#a8b8d8;text-transform:uppercase;letter-spacing:.25em}
.hero{min-height:260px}
</style>
</head>
<body>
<div class="shell">
  <h1>THERUM</h1>
  <div class="small">Flagship Hybrid Synth Platform</div>
  <div style="margin-top:12px">
    <span class="tag">Arc Routing</span>
    <span class="tag">Dark Neon</span>
    <span class="tag">Punch Reactor</span>
  </div>
  <div class="row">
    <div class="card hero"><div class="small">Oscillator Field</div><h2>Drawn Wave Lab</h2></div>
    <div class="card"><div class="small">Filter Core</div><h2>Neon Cathedral</h2></div>
    <div class="card"><div class="small">Preset View</div><h2>Preset Shard Vault</h2></div>
  </div>
  <div class="row">
    <div class="card"><div class="small">Modulation</div><h2>LFO / ENV ARC</h2></div>
    <div class="card"><div class="small">Matrix</div><h2>Arc Routing Table</h2></div>
    <div class="card"><div class="small">Mascot</div><h2>Punch Reactor</h2></div>
  </div>
</div>
</body>
</html>
